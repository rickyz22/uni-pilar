name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_AUTH: ${{ github.repository }}/auth-service
  IMAGE_ACADEMIC: ${{ github.repository }}/academic-service
  IMAGE_CLIENT: ${{ github.repository }}/client

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            services/auth/package-lock.json
            services/academic/package-lock.json

      - name: Install auth service dependencies
        working-directory: ./services/auth
        run: npm ci

      - name: Install academic service dependencies
        working-directory: ./services/academic
        run: npm ci

      - name: Run auth service tests
        working-directory: ./services/auth
        run: npm test
        continue-on-error: true

      - name: Run academic service tests
        working-directory: ./services/academic
        run: npm test
        continue-on-error: true

  build:
    name: Build Docker Images
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_AUTH }}:${{ github.sha }}

      - name: Build & push academic-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/academic
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_ACADEMIC }}:${{ github.sha }}

      - name: Build & push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_CLIENT }}:${{ github.sha }}

  deploy:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        run: |
          echo "Deploying version ${{ github.sha }}"
          echo "Auth: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_AUTH }}:${{ github.sha }}"
          echo "Academic: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_ACADEMIC }}:${{ github.sha }}"
          echo "Client: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_CLIENT }}:${{ github.sha }}"
          # Add your deployment script here
          # curl -X POST "${{ secrets.DEPLOY_WEBHOOK }}" ...
